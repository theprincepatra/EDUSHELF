<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduShelf Sign Up</title>
    <link rel="stylesheet" href="signup.css">
</head>

<body>

    <div class="container">

        <!-- Left Section SAME -->
        <div class="left">
            <div class="l_designation">
                <img class="logo" src="logo_bgremove.png" alt="logo">
                <div class="designation">
                    <h1 class="edushelf">EduShelf</h1>
                    <p class="tagline">Learn. Build. Grow</p>
                </div>
            </div>

            <div class="features">
                <div class="feature">🚀 Smart Learning</div>
                <div class="feature">💡 Skill Building</div>
                <div class="feature">📈 Career Growth</div>
            </div>
        </div>

        <!-- SIGNUP CARD -->
        <div class="login-card">

            <div class="top">
                <span>Create your account</span>
                <p>Start your journey with EduShelf</p>
            </div>

            <div class="input-group">
                <img class="user_icon" src="user_logo.png">
                <input type="text" placeholder="Full Name">
                <small class="error"></small>
            </div>

            <div class="input-group">
                <img class="mail_icon" src="mail_logo.png">
                <input type="text" placeholder="Email">
                <small class="error"></small>
            </div>

            <div class="input-group">
                <img class="pass_icon" src="pass_logo.png">
                <input type="password" placeholder="Password">
                <small class="error"></small>
            </div>

            <div class="input-group">
                <img class="confirmpass_icon" src="confirmpass_logo.png">
                <input type="password" placeholder="Confirm Password">
                <small class="error"></small>
            </div>

            <button class="signup-btn">Create Account</button>

            <div class="divider">OR</div>

            <div class="signin-section">
                <button class="signin-btn">SIGN IN</button>
                <p class="create">Already have an account?</p>
            </div>

        </div>

    </div>

    <script src="signup.js"></script>
</body>

</html>
