<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing</title>
    <link rel="stylesheet" href="landing.css">
</head>

<body>

<div class="top_img">

    <img src="frame.png" alt="bg_frame" class="bg-img">

    <!-- NAVBAR -->
    <div class="nav">

        <div class="nav-top">
            <img src="logo_bgremove.png" alt="logo">
            <p class="edushelf">EDUSHELF</p>
        </div>

        <div class="nav-links">
            <p class="nav-item">Description</p>
            <p class="nav-item">Features</p>
            <p class="nav-item">Contact</p>
            <p class="nav-item">Help</p>
            <p class="nav-item2">Access Notes</p>
        </div>

    </div>

    <!-- FEATURES -->
    <div class="data">
        <div class="data_style">
            <div class="icon">📚</div>
            <div class="text">
                <p>All Streams Notes</p>
                <sub>CSE, Civil, ECE...</sub>
            </div>
        </div>

        <div class="data_style">
            <div class="icon">🎓</div>
            <div class="text">
                <p>Student-Centric Design</p>
                <sub>Made for learning</sub>
            </div>
        </div>

        <div class="data_style">
            <div class="icon">🗂️</div>
            <div class="text">
                <p>Structured & Clean</p>
                <sub>Clear, clutter-free organization</sub>
            </div>
        </div>
    </div>

    <!-- CAPTION -->
    <div class="caption">
        A Digital Shelf, Designed for Smarter
        <span>Learning</span>.
    </div>

    <!-- BUTTONS -->
    <div class="login_up">
        <button class="login">Log in</button>
        <button class="signup">Sign up</button>
    </div>

    <!-- FOOTER TAG -->
    <div class="tag">Designed by: <a href="https://www.instagram.com/theprincepatra/" target="_blank">Prince Patra</a></div>

</div>

<script src="landing.js"></script>

</body>
</html>
